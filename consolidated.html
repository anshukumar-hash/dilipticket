<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidated Ticket View</title>
<style>
  :root{
    --bg:#f6f7f9;--surface:#fff;--surface2:#f1f3f5;--border:#e3e6ea;
    --text:#1a1d21;--muted:#6b7280;--accent:#2563eb;--green:#16a34a;--red:#dc2626;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  header h1{font-size:17px;margin:0;font-weight:600;}
  header .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .controls input,.controls select{padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text);}
  .controls input{min-width:220px;}
  .btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;}
  .btn:hover{background:var(--surface2);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary:hover{opacity:.92;}
  .wrap{padding:16px 24px;}
  .meta{color:var(--muted);font-size:12px;margin-bottom:10px;}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:auto;max-height:calc(100vh - 180px);}
  table{width:100%;border-collapse:collapse;white-space:nowrap;}
  th{position:sticky;top:0;background:var(--surface2);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  th:hover{color:var(--text);}
  th.sorted{color:var(--accent);}
  td{padding:9px 12px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:var(--surface2);}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
  .ok{color:var(--green);} .bad{color:var(--red);}
  .empty{padding:40px;text-align:center;color:var(--muted);}
  .num{text-align:right;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<header>
  <div>
    <h1>📋 Consolidated Ticket View</h1>
    <div class="sub" id="subtitle">Loading tickets…</div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search any field…">
    <select id="statusFilter"><option value="">All statuses</option></select>
    <button class="btn" onclick="load()">↻ Refresh</button>
    <button class="btn primary" onclick="exportCSV()">⬇ Export Excel (CSV)</button>
  </div>
</header>

<div class="wrap">
  <div class="meta" id="meta"></div>
  <div class="table-wrap">
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="body"><tr><td class="empty">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API_URL = '/api/tickets';

// Columns to show, in order. `key` = field name from /api/tickets.
const COLUMNS = [
  { key: 'Ticket ID',                label: 'Ticket ID' },
  { key: 'Status',                   label: 'Status' },
  { key: 'Priority',                 label: 'Priority' },
  { key: 'Created time',             label: 'Created time',     date: true },
  { key: 'Resolved time',            label: 'Resolved time',    date: true },
  { key: 'Closed time',              label: 'Closed time',      date: true },
  { key: 'Last update time',         label: 'Last update time', date: true },
  { key: 'Resolution time (in hrs)', label: 'Resolution time (hrs)', num: true },
  { key: 'Resolution status',        label: 'Resolution status' },
  { key: 'First response status',    label: 'First response status' },
  { key: 'Enterprise Name',          label: 'Enterprise Name' },
  { key: 'Product (Studio/Vini)',    label: 'Product (Studio/Vini)' },
  { key: 'Enterprise ID',            label: 'Enterprise ID' },
];

let RAW = [];
let sortKey = 'Ticket ID';
let sortDir = -1; // -1 desc, 1 asc

function fmtDate(v){
  if(!v) return '';
  const d = new Date(v);
  if(isNaN(d)) return v;
  // e.g. 24 Jun 2026, 14:05
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function slaCell(v){
  if(!v) return '';
  const cls = /within/i.test(v) ? 'ok' : (/violat/i.test(v) ? 'bad' : '');
  return `<span class="pill ${cls}">${v}</span>`;
}

async function load(){
  document.getElementById('body').innerHTML = '<tr><td class="empty">Loading…</td></tr>';
  document.getElementById('subtitle').textContent = 'Loading tickets…';
  try{
    const res = await fetch(API_URL);
    if(!res.ok){
      const t = await res.text();
      throw new Error('API ' + res.status + ' — ' + t.slice(0,200));
    }
    RAW = await res.json();
    if(!Array.isArray(RAW)) throw new Error('Unexpected response: ' + JSON.stringify(RAW).slice(0,200));
    // Build status filter options
    const statuses = [...new Set(RAW.map(r => r['Status']).filter(Boolean))].sort();
    const sel = document.getElementById('statusFilter');
    sel.innerHTML = '<option value="">All statuses</option>' + statuses.map(s=>`<option>${s}</option>`).join('');
    document.getElementById('subtitle').textContent = RAW.length + ' tickets loaded';
    render();
  }catch(err){
    document.getElementById('subtitle').textContent = 'Error';
    document.getElementById('body').innerHTML =
      `<tr><td class="empty bad">Could not load data.<br>${err.message}<br><br>Check that FRESHDESK_DOMAIN (=<b>spyne</b>) and FRESHDESK_API_KEY are set in Vercel.</td></tr>`;
  }
}

function currentRows(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sf = document.getElementById('statusFilter').value;
  let rows = RAW.filter(r=>{
    if(sf && r['Status'] !== sf) return false;
    if(!q) return true;
    return COLUMNS.some(c => String(r[c.key] ?? '').toLowerCase().includes(q));
  });
  rows.sort((a,b)=>{
    let x = a[sortKey] ?? '', y = b[sortKey] ?? '';
    const col = COLUMNS.find(c=>c.key===sortKey);
    if(col && (col.num)){ x = parseFloat(x)||0; y = parseFloat(y)||0; }
    else if(col && col.date){ x = x?new Date(x).getTime():0; y = y?new Date(y).getTime():0; }
    else if(sortKey==='Ticket ID'){ x = parseInt(x)||0; y = parseInt(y)||0; }
    else { x = String(x).toLowerCase(); y = String(y).toLowerCase(); }
    return x < y ? -1*sortDir : x > y ? 1*sortDir : 0;
  });
  return rows;
}

function render(){
  // Header
  document.getElementById('head').innerHTML = COLUMNS.map(c=>{
    const arrow = c.key===sortKey ? (sortDir===1?' ▲':' ▼') : '';
    const cls = c.key===sortKey ? 'sorted' : '';
    return `<th class="${cls}" onclick="setSort('${c.key.replace(/'/g,"\\'")}')">${c.label}${arrow}</th>`;
  }).join('');

  const rows = currentRows();
  document.getElementById('meta').textContent =
    `Showing ${rows.length} of ${RAW.length} tickets`;

  if(!rows.length){
    document.getElementById('body').innerHTML = '<tr><td class="empty" colspan="'+COLUMNS.length+'">No tickets match your filters.</td></tr>';
    return;
  }
  document.getElementById('body').innerHTML = rows.map(r=>{
    return '<tr>' + COLUMNS.map(c=>{
      let v = r[c.key] ?? '';
      let cell;
      if(c.date) cell = fmtDate(v);
      else if(c.key==='Resolution status' || c.key==='First response status') cell = slaCell(v);
      else cell = String(v);
      const tdcls = c.num ? ' class="num"' : '';
      return `<td${tdcls}>${cell}</td>`;
    }).join('') + '</tr>';
  }).join('');
}

function setSort(key){
  if(sortKey===key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  render();
}

function exportCSV(){
  const rows = currentRows();
  const esc = v => {
    v = String(v ?? '');
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
  };
  const header = COLUMNS.map(c=>esc(c.label)).join(',');
  const lines = rows.map(r => COLUMNS.map(c=>{
    let v = r[c.key] ?? '';
    if(c.date) v = fmtDate(v);
    return esc(v);
  }).join(','));
  const csv = '﻿' + [header, ...lines].join('\r\n'); // BOM so Excel reads UTF-8
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'consolidated_tickets.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);
load();
</script>
</body>
</html>
